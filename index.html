<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OCR Imagenes</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family: Arial;
margin:30px;
}

button{
padding:10px 20px;
margin:10px 0;
font-size:16px;
}

#resultado{
white-space:pre-wrap;
border:1px solid #ccc;
padding:15px;
margin-top:10px;
min-height:200px;
}

</style>

</head>

<body>

<h2>OCR de imágenes</h2>

<input type="file" id="imagenes" multiple accept="image/*">

<br>

<button onclick="analizar()">Analizar</button>
<button onclick="copiar()">Copiar resultado</button>

<div id="resultado"></div>

<script>

async function analizar(){

const files = document.getElementById("imagenes").files;
const salida = document.getElementById("resultado");

if(files.length===0){
alert("Seleccione imágenes");
return;
}

salida.textContent="";

const worker = await Tesseract.createWorker();

await worker.loadLanguage('eng');
await worker.initialize('eng');

for(let i=0;i<files.length;i++){

const file = files[i];

const { data } = await worker.recognize(file);

salida.textContent += "===IMAGEN===\n";
salida.textContent += data.text.trim() + "\n";
salida.textContent += "===FIN===\n\n";

}

await worker.terminate();

}

function copiar(){

const texto = document.getElementById("resultado").textContent;

navigator.clipboard.writeText(texto);

alert("Copiado");

}

</script>

</body>
</html>
